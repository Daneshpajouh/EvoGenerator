name: Temporary public NV-02 amendment-A rerun

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/nv02-public-runner-amendment-a.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-nv02-amendment-a:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/nv02-dr23-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned numerical dependency
        run: python -m pip install --disable-pip-version-check scipy==1.15.3

      - name: Recover the original frozen bundle
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, io, tarfile
          from pathlib import Path

          workflow = Path('.github/workflows/nv02-public-runner.yml').read_text(encoding='utf-8').splitlines()
          marker = "cat <<'NV02_B64' | base64 -d | tar -xzf - -C research/nv02"
          index = next(i for i, line in enumerate(workflow) if marker in line)
          payload = base64.b64decode(workflow[index + 1].strip())
          target = Path('research/nv02')
          target.mkdir(parents=True, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall(target)
          PY
          test -f research/nv02/run_nv02.py

      - name: Apply only hash-frozen technical amendment A
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('research/nv02')
          prereg = '82b2560ba1f3de379b8d0c4af0e83d466d988305f77ec5793461d22744e52d1f'
          amendment = 'ca6bad381141f3433777af94525e1cc23a88e28961521874fabcf9881bce7f79'

          path = root / 'path_a.py'
          text = path.read_text(encoding='utf-8')
          old = 'key_centres: dict[tuple[str, tuple[str, ...]], tuple[str, ...]] = {}'
          new = 'key_centres: dict[tuple[str, tuple[str, ...]], set[str]] = defaultdict(set)'
          assert old in text
          text = text.replace(old, new, 1)
          old = '        key_centres[key] = tuple((row.get(column) or "").strip() for column in centre_cols)\n'
          new = (
              '        for centre_column in centre_cols:\n'
              '            centre_value = (row.get(centre_column) or "").strip()\n'
              '            if centre_value:\n'
              '                key_centres[key].add(centre_value)\n'
          )
          assert old in text
          text = text.replace(old, new, 1)
          old = '                "centres": key_centres[(gene, independence_key)],'
          new = '                "centres": sorted(key_centres[(gene, independence_key)]),'
          assert old in text
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = root / 'test_nv02.py'
          text = path.read_text(encoding='utf-8')
          needle = '''            writer.writerow(\n                {\n                    "Gene Accession Id": gene,\n                    "Gene Symbol": f"G{i}",\n                    "Allele Symbol": f"G{i}<b>",'''
          insert = '''            if i == 0:\n                writer.writerow(\n                    {\n                        "Gene Accession Id": gene,\n                        "Gene Symbol": f"G{i}",\n                        "Allele Symbol": f"G{i}<a>",\n                        "Allele Accession Id": f"MGI:allele:{i}a",\n                        "Phenotyping Centre": "Centre-Z",\n                        "Production Centre": "Prod-A",\n                        "Viability Phenotype HOMs/HEMIs": "viable",\n                        "Comment": "",\n                    }\n                )\n            writer.writerow(\n                {\n                    "Gene Accession Id": gene,\n                    "Gene Symbol": f"G{i}",\n                    "Allele Symbol": f"G{i}<b>",'''
          assert needle in text
          text = text.replace(needle, insert, 1)
          old = '    assert a["evaluated_genes"] == b["evaluated_genes"]\n'
          new = (
              old
              + '    assert a["evaluated_gene_centres"] == b["evaluated_gene_centres"]\n'
              + '    assert "Centre-Z" in a["evaluated_gene_centres"]["MGI:100000"]\n'
          )
          assert old in text
          text = text.replace(old, new, 1)
          old = '    assert a["leave_one_centre_out"] == b["leave_one_centre_out"]\n'
          new = '''    assert len(a["leave_one_centre_out"]) == len(b["leave_one_centre_out"])\n    for left, right in zip(a["leave_one_centre_out"], b["leave_one_centre_out"]):\n        assert left["left_out_centre"] == right["left_out_centre"]\n        assert left["N"] == right["N"]\n        assert left["X"] == right["X"]\n        if left["B95"] is None or right["B95"] is None:\n            assert left["B95"] is right["B95"]\n        else:\n            assert abs(left["B95"] - right["B95"]) <= 1e-10\n'''
          assert old in text
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          for filename in ('compare_nv02.py', 'run_nv02.py'):
              path = root / filename
              text = path.read_text(encoding='utf-8')
              anchor = f'PREREG_SHA256 = "{prereg}"\n'
              assert anchor in text
              text = text.replace(
                  anchor,
                  anchor + f'TECHNICAL_AMENDMENT_A_SHA256 = "{amendment}"\n',
                  1,
              )
              metadata_anchor = '        "prereg_sha256": PREREG_SHA256,\n'
              assert metadata_anchor in text
              text = text.replace(
                  metadata_anchor,
                  metadata_anchor + '        "technical_amendment_a_sha256": TECHNICAL_AMENDMENT_A_SHA256,\n',
                  1,
              )
              if filename == 'compare_nv02.py':
                  report_anchor = '- **Preregistration:** `SOURCE-VERIFIED`; SHA-256 `{PREREG_SHA256}`.\n'
                  assert report_anchor in text
                  text = text.replace(
                      report_anchor,
                      report_anchor + '- **Post-result technical amendment A:** `IMPLEMENTED`; SHA-256 `{TECHNICAL_AMENDMENT_A_SHA256}`.\n',
                      1,
                  )
              path.write_text(text, encoding='utf-8')

          receipt = {
              'state': 'IMPLEMENTED',
              'parent_prereg_sha256': prereg,
              'technical_amendment_a_sha256': amendment,
              'failed_run_id': '29615420035',
              'failed_artifact_id': '8420298837',
              'permitted_change': 'union all explicit centres per gene/allele identity in path A',
              'scientific_threshold_change': False,
          }
          (root / 'TECHNICAL_AMENDMENT_A_RECEIPT.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          python -m py_compile research/nv02/*.py

      - name: Execute repaired synthetic test and unchanged scientific analysis
        run: python research/nv02/run_nv02.py

      - name: Display immutable result files
        if: always()
        shell: bash
        run: |
          if test -d research/nv02/results; then
            find research/nv02/results -maxdepth 1 -type f -print \
              -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
          fi
          if test -f research/nv02/TECHNICAL_AMENDMENT_A_RECEIPT.json; then
            cat research/nv02/TECHNICAL_AMENDMENT_A_RECEIPT.json
          fi

      - name: Upload repaired result and complete evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nv02-dr23-amendment-a-${{ github.run_id }}-${{ github.run_attempt }}
          path: research/nv02
          if-no-files-found: error
          retention-days: 90
