name: Temporary public HSPC-SEN-01G runner

on:
  pull_request:
    branches:
      - master
    paths:
      - research/hspc_sen_01g/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-hspc-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/impc-solr-link-bridge-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned workbook reader
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Execute frozen public linkage gate
        run: python research/hspc_sen_01g/run_hspc_gate.py

      - name: Execute source-only PMC amendment A
        run: python research/hspc_sen_01g/run_pmc_amendment_a_v2.py

      - name: Execute exhaustive workbook amendment B
        run: python research/hspc_sen_01g/run_workbook_audit_b.py

      - name: Display immutable result files
        if: always()
        shell: bash
        run: |
          for directory in \
            research/hspc_sen_01g/results \
            research/hspc_sen_01g/pmc_audit_results \
            research/hspc_sen_01g/workbook_audit_b_results; do
            if test -d "$directory"; then
              find "$directory" -maxdepth 1 -type f -print \
                -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
            fi
          done

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hspc-sen-01g-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            research/hspc_sen_01g/results
            research/hspc_sen_01g/pmc_audit_results
            research/hspc_sen_01g/workbook_audit_b_results
          if-no-files-found: warn
          retention-days: 90
