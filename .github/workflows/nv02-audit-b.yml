name: Temporary public NV-02 adversarial audit B

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/nv02-audit-b.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-audit-b:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/nv02-dr23-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: python -m pip install --disable-pip-version-check pandas==2.2.3 scipy==1.15.3

      - name: Materialize audit code and verify bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research/nv02_audit_b /tmp/nv02-audit-b
          cat <<'AUDIT_B64' | base64 -d > /tmp/nv02-audit-b/code.tar.gz
          
          AUDIT_B64
          echo "1b9d945be63fa212a9b2981011f60f312f2bb0584e27ce18588974ce00cb80e2  /tmp/nv02-audit-b/code.tar.gz" | sha256sum -c -
          tar -xzf /tmp/nv02-audit-b/code.tar.gz -C research/nv02_audit_b
          python -m py_compile research/nv02_audit_b/*.py

      - name: Execute two independent audit paths
        run: python research/nv02_audit_b/run_audit_b.py

      - name: Display immutable audit outputs
        if: always()
        shell: bash
        run: |
          if test -d research/nv02_audit_b/results; then
            find research/nv02_audit_b/results -maxdepth 1 -type f -print \
              -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
          fi

      - name: Upload complete audit evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nv02-audit-b-${{ github.run_id }}-${{ github.run_attempt }}
          path: research/nv02_audit_b
          if-no-files-found: error
          retention-days: 90
