name: Temporary public NV-02 DR23 runner

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/nv02-public-runner.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-nv02:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/nv02-dr23-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned numerical dependency
        run: python -m pip install --disable-pip-version-check scipy==1.15.3

      - name: Materialize the hash-frozen execution bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research/nv02
          cat <<'NV02_B64' | base64 -d | tar -xzf - -C research/nv02
          
          NV02_B64
          test -f research/nv02/run_nv02.py
          python -m py_compile research/nv02/*.py

      - name: Execute synthetic tests, acquisition, two code paths, and cross-release comparison
        run: python research/nv02/run_nv02.py

      - name: Display immutable result files
        if: always()
        shell: bash
        run: |
          if test -d research/nv02/results; then
            find research/nv02/results -maxdepth 1 -type f -print \
              -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
          fi

      - name: Upload result, code, source manifests, and failure records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nv02-dr23-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: research/nv02
          if-no-files-found: error
          retention-days: 90
