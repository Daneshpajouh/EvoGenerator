name: Temporary public NV-01 execution runner

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    paths:
      - .github/workflows/nv01-public-runner.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-nv01:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/impc-solr-link-bridge-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned numerical dependency
        run: python -m pip install --disable-pip-version-check scipy==1.15.3

      - name: Execute frozen analysis and independent reproduction
        run: python research/nv01/run_nv01.py

      - name: Display immutable result files
        if: always()
        shell: bash
        run: |
          if test -d research/nv01/results; then
            find research/nv01/results -maxdepth 1 -type f -print -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
          fi

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nv01-public-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: research/nv01/results
          if-no-files-found: warn
          retention-days: 90
