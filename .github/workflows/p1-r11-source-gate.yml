name: Temporary public P1 R11 source gate

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/p1-r11-source-gate.yml
      - research/p1_r11_source_gate/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-source-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out frozen research branch
        uses: actions/checkout@v4
        with:
          ref: research/p1-r11-source-gate-2026-07-17

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependencies
        run: python -m pip install --disable-pip-version-check pandas==2.2.3 openpyxl==3.1.5 xlrd==2.0.1

      - name: Compile gate
        run: python -m py_compile research/p1_r11_source_gate/run_gate.py

      - name: Execute frozen source gate
        run: python research/p1_r11_source_gate/run_gate.py

      - name: Display immutable result files
        if: always()
        shell: bash
        run: |
          if test -d research/p1_r11_source_gate/results; then
            find research/p1_r11_source_gate/results -maxdepth 1 -type f -print \
              -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
          fi

      - name: Upload gate code and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1-r11-source-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: research/p1_r11_source_gate
          if-no-files-found: error
          retention-days: 90
